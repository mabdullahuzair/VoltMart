<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Details</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="product-details-container">
    <div class="product-image">
      <img src="https://via.placeholder.com/400x400.png?text=Product+Image" alt="Product Image" />
    </div>
    <div class="product-info">
      <h1 class="product-title">Sample Product Title</h1>
      <p class="product-price">$99.99</p>
      <p class="product-description">
        This is a detailed description of the sample product. It highlights key features and benefits, providing all the information the customer needs to make a purchase decision.
      </p>
      <button class="add-to-cart-btn">Add to Cart</button>
    </div>
  </div>
</body>
</html>
